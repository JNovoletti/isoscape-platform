services:

  # ─────────────────────────────────────────
  # 1. Banco de Dados — MariaDB 11
  # ─────────────────────────────────────────
  db:
    image: mariadb:11
    container_name: isoscape_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MARIADB_DATABASE: ${DB_NAME:-isoscape_db}
      MARIADB_USER: ${DB_USER:-isoscape_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-isoscape_pass}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # 2. Broker de Filas — Redis 7
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: isoscape_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # 3. Backend — Django + Gunicorn
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: isoscape_backend
    restart: unless-stopped
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-isoscape_db}
      - DB_USER=${DB_USER:-isoscape_user}
      - DB_PASSWORD=${DB_PASSWORD:-isoscape_pass}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DEBUG=${DEBUG:-True}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
    volumes:
      - ./backend:/app
      - data_rasters:/data/rasters
      - data_shapefiles:/data/shapefiles
      - data_isoscapes:/data/isoscapes
      - data_worldclim:/data/worldclim_cache
      - data_datasets:/data/datasets
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────
  # 4. Worker — Celery + R
  #    Usa Dockerfile separado (r-base:4.4 + Python)
  # ─────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: isoscape_worker
    restart: unless-stopped
    command: celery -A config worker --loglevel=info --concurrency=2
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-isoscape_db}
      - DB_USER=${DB_USER:-isoscape_user}
      - DB_PASSWORD=${DB_PASSWORD:-isoscape_pass}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
    volumes:
      - ./backend:/app
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────
  # 5. Frontend — React (build) + Nginx
  # ─────────────────────────────────────────
  frontend:
    build:
      context: .                        # raiz do monorepo (acessa nginx/ e frontend/)
      dockerfile: frontend/Dockerfile
    container_name: isoscape_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

# ─────────────────────────────────────────
# Volumes persistentes
# ─────────────────────────────────────────
volumes:
  db_data:
  data_rasters:
  data_shapefiles:
  data_isoscapes:
  data_worldclim:
  data_datasets: